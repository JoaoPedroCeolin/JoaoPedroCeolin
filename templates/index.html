<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Site do Cebola</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #111;
    color: white;
    margin: 0;
    padding: 20px;
}

.card {
    background: #1e1e1e;
    padding: 20px;
    border-radius: 15px;
    max-width: 450px;
    margin: auto;
}

button {
    font-size: 18px;
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: #00ff88;
    cursor: pointer;
    margin: 5px;
}

canvas {
    background: white;
    margin-top: 20px;
    display: block;
    margin-left: auto;
    margin-right: auto;
    border-radius: 10px;
    border: 1px solid #333;
}

#mensagemJogo {
    font-size: 20px;
    font-weight: bold;
    color: #ff5555;
    min-height: 30px;
}
</style>
</head>
<body>

<div class="card">
    <h1>🔥 Site do Cebola 🔥</h1>

    <p>Visitantes únicos: <b>{{ visitas }}</b></p>
    <p>Cliques: <b id="contador">{{ cliques }}</b></p>

    <p>⭐ Pontos: <b id="pontos">0</b></p>
    <p>🏆 Recorde Global: <b id="recorde">{{ recorde }}</b></p>

    <button onclick="clicar()">CLICAR</button>
    <button onclick="window.location.href='/aura'">AURA</button>
    <button onclick="window.location.href='/snake'">🐍 COBRINHA</button>

    <br><br>

    <button onclick="iniciarJogo()">▶ INICIAR DINO</button>
    <button onclick="pular()">🦖 PULAR</button>

    <canvas id="game" width="400" height="150"></canvas>

    <p id="mensagemJogo"></p>
</div>

<script>
function clicar() {
    fetch("/click", { method: "POST" })
    .then(res => res.json())
    .then(data => {
        document.getElementById("contador").innerText = data.cliques;
    });
}

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// Imagens
const dinoImg = new Image();
dinoImg.src = "/static/dinosaur.png?v=1";

const cactusImg = new Image();
cactusImg.src = "/static/images.png?v=1";

let jogoIniciado = false;
let gameOver = false;
let pontos = 0;

let dino = {
    x: 50,
    y: 50,
    w: 60,
    h: 60,
    vy: 0,
    jumping: false
};

let cactus = {
    x: 500,
    y: 80,
    w: 50,
    h: 50
};

function iniciarJogo() {
    jogoIniciado = true;
    gameOver = false;

    document.getElementById("mensagemJogo").innerText = "";

    pontos = 0;
    document.getElementById("pontos").innerText = "0";

    dino.y = 50;
    dino.vy = 0;
    dino.jumping = false;

    cactus.x = 500;
}

function pular() {
    if (jogoIniciado && !gameOver && !dino.jumping) {
        dino.vy = -12;
        dino.jumping = true;
    }
}

function desenharTelaInicial() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "black";
    ctx.font = "20px Arial";
    ctx.fillText("Clique em INICIAR DINO", 85, 75);
}

function enviarRecorde() {
    fetch("/recorde", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            pontos: pontos
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("recorde").innerText = data.recorde;
    });
}

function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!jogoIniciado) {
        desenharTelaInicial();
        requestAnimationFrame(update);
        return;
    }

    ctx.fillStyle = "black";
    ctx.fillRect(0, 130, canvas.width, 2);

    dino.y += dino.vy;
    dino.vy += 0.6;

    if (dino.y > 50) {
        dino.y = 50;
        dino.vy = 0;
        dino.jumping = false;
    }

    cactus.x -= 5;

    if (cactus.x < -60) {
        cactus.x = 500;

        pontos++;
        document.getElementById("pontos").innerText = pontos;
    }

    if (
        dino.x < cactus.x + cactus.w &&
        dino.x + dino.w > cactus.x &&
        dino.y < cactus.y + cactus.h &&
        dino.y + dino.h > cactus.y
    ) {
        enviarRecorde();

        gameOver = true;
        jogoIniciado = false;

        document.getElementById("mensagemJogo").innerText =
            "💥 GAME OVER! Pontos: " + pontos;
    }

    if (dinoImg.complete && dinoImg.naturalWidth > 0) {
        ctx.drawImage(
            dinoImg,
            dino.x,
            dino.y,
            dino.w,
            dino.h
        );
    }

    if (cactusImg.complete && cactusImg.naturalWidth > 0) {
        ctx.drawImage(
            cactusImg,
            cactus.x,
            cactus.y,
            cactus.w,
            cactus.h
        );
    }

    requestAnimationFrame(update);
}

document.addEventListener("keydown", function(e) {
    if (e.code === "Space") {
        e.preventDefault();
        pular();
    }
});

canvas.addEventListener("touchstart", function(e) {
    e.preventDefault();
    pular();
});

update();
</script>

</body>
</html>
